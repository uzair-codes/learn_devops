---

- name: Loops (loop, with_item)
  hosts: all
  become: true
  vars:
    users:
      - syed
      - uzair
      - niaz
      - ali
      - shah

  tasks:
    - name: Create Group
      group:
        name: DevOps
        state: present
        # state: absent

    - name: Create user
      user:
        name: "{{ item }}"
        shell: /bin/bash
        groups: DevOps
        append: true
        # state: present
        password: "{{ 'uzair@5525' | password_hash('sha512') }}"
        state: absent   
        # remove: true
        ## Unless set to false, a home directory will be made for the user when the account is created or if the home directory does not exist.
        # home: /home/uzair
        # create_home: true
      loop: "{{ users }}" 
