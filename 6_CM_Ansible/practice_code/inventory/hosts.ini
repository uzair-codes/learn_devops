# This is the ansible 'hosts' file.
#
#   - Comments begin with the '#' character
#   - Blank lines are ignored
#   - Groups of hosts are delimited by [header] elements
#   - You can enter hostnames or ip addresses
#   - A hostname/ip can be a member of multiple groups

# Ex 1: Ungrouped hosts, specify before any group headers:

## green.example.com
## 192.168.100.10

# Ex 2: A collection of hosts belonging to the 'webservers' group:

## [webservers]
## alpha.example.org
## 192.168.1.110
# [servers]
# server_1 ansible_host=18.209.43.91
# server_2 ansible_host=100.26.29.41
# server_3 ansible_host=3.80.100.68
#
# [servers:vars]
# ansible_python_interpreter=/usr/bin/python3
# ansible_user=ubuntu
# ansible_ssh_private_key_file=/path-to-private-key

[webservers]
server1 ansible_host=13.232.226.209
# server2 ansible_host=13.233.9.142
# server3 ansible_host=13.201.91.181

[webservers:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3


# If you have multiple hosts following a pattern, you can specify
# them like this:

## www[001:006].example.com

# You can also use ranges for multiple hosts:

## db-[99:101]-node.example.com

# Ex 3: A collection of database servers in the 'dbservers' group:

## [dbservers]
##
## db01.intranet.mydomain.net
## db02.intranet.mydomain.net
## 10.25.1.56
## 10.25.1.57


# Ex4: Multiple hosts arranged into groups such as 'Debian' and 'openSUSE':

## [Debian]
## alpha.example.org
## beta.example.org

## [openSUSE]
## green.example.com
## blue.example.com
